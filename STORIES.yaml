version: 1
project: SecondLook Trainer
app_strategy: single_mobile_friendly_web_app
principles:
  - The instant scam check and the safety drill are separate user stories.
  - User-submitted content is redacted and defanged before any external analysis.
  - LLM output is a judge prefilter, not final truth.
  - Human-reviewed items can become quiz questions and dataset rows.
  - Quiz feedback should build safer habits, not trivia recall.

status_values:
  scam_status:
    - verified_scam
    - suspected_scam
    - legitimate
  scope_status:
    - in_scope_phishing_or_scam
    - benign_contrast
    - out_of_scope_spam
    - reject

experiences:
  - id: suspected_content_forwarder
    name: Suspected Content Forwarder Or Paster
    starts_when: User receives suspicious content and wants a second opinion before clicking, replying, paying, or forwarding.
    primary_device: mobile_web
    stories:
      - id: forwarder.check_suspicious_content
        title: Check Suspicious Content
        story: As a user, when I receive a suspicious SMS, WhatsApp message, email, screenshot, link, or social post, I want to paste or upload it so I can know whether it looks like a scam or legitimate.
        hackathon_scope: must_build
        acceptance:
          - Supports pasted text in the demo.
          - Supports at least one screenshot or seeded visual example if time allows.
          - Result is visible in a mobile viewport.

      - id: forwarder.browser_side_redaction
        title: Browser-Side PII Redaction
        story: As a user, I want obvious PII redacted before analysis so private details are not unnecessarily exposed.
        hackathon_scope: must_build
        acceptance:
          - Redacts obvious emails, phone numbers, account-like numbers, addresses, and names when detected.
          - Defangs suspicious URLs before display.
          - Runs before any external API call.

      - id: forwarder.view_redacted_submission
        title: See Redacted Submission
        story: As a user, I want to see the redacted version of what I submitted so I trust what was analyzed.
        hackathon_scope: must_build
        acceptance:
          - Shows the uploaded or pasted content after PII masking.
          - Displays a clear notice that PII was redacted browser-side.

      - id: forwarder.get_scam_status
        title: Get A Scam Status
        story: As a user, I want a clear result of verified scam, suspected scam, or legitimate.
        hackathon_scope: must_build
        acceptance:
          - LLM-only results default to suspected_scam for harmful-looking content.
          - verified_scam requires reviewed seed/source/admin-approved pattern matching.
          - legitimate still includes caution notes rather than pretending certainty.

      - id: forwarder.get_next_action
        title: Understand What To Do Next
        story: As a user, if content is scam or suspected scam, I want red flags and the safest next action.
        hackathon_scope: must_build
        acceptance:
          - Shows 2-4 red flags.
          - Gives one safest next action.
          - Avoids broad fact checking or truth arbitration.

      - id: forwarder.legitimate_skepticism
        title: Stay Skeptical Of Legitimate Content
        story: As a user, if content appears legitimate, I want quick notes on claims I should still treat carefully.
        hackathon_scope: must_build
        acceptance:
          - Shows likely legitimate status.
          - Highlights claims or requests worth skepticism.
          - Does not launch a full verification workflow.

      - id: forwarder.submit_for_human_review
        title: Submit For Human Review
        story: As a user, I want to send the case to a trusted reviewer if I am still unsure.
        hackathon_scope: should_seed_or_mock
        acceptance:
          - The demo can create a review queue item from the check result.

      - id: forwarder.forward_directly
        title: Forward Directly From Messaging Apps
        story: As a user, I want to forward suspicious content directly into SecondLook from WhatsApp or email.
        hackathon_scope: do_not_build_now
        reason: Real messaging integrations are slow and judge-invisible compared with the review/play loop.

      - id: forwarder.receive_followup
        title: Receive Human Review Follow-Up
        story: As a user, I want to be notified when a human reviewer confirms the result.
        hackathon_scope: do_not_build_now
        reason: Notifications are not needed for the judged demo.

  - id: superadmin_human_reviewer
    name: Superadmin And Human Reviewer
    starts_when: A submitted or seeded item needs judgment, correction, or conversion into a quiz question.
    primary_device: desktop_or_tablet_web
    stories:
      - id: admin.review_queue
        title: Review Incoming Submissions
        story: As an admin, I want a queue of submitted suspicious content so I can decide what deserves review or training conversion.
        hackathon_scope: must_build
        acceptance:
          - Queue shows redacted content, source, scam status, and review status.
          - Queue includes seeded examples for deterministic demos.

      - id: admin.llm_prefilter
        title: Use LLM Judge Prefilter
        story: As an admin, I want the LLM to pre-classify scam status, risk level, threat type, red flags, safest action, and skill tags so I can move faster.
        hackathon_scope: must_build
        acceptance:
          - Prefilter output is visibly editable.
          - UI labels it as draft or prefilter output.

      - id: admin.correct_classification
        title: Approve Or Correct Scam Classification
        story: As an admin, I want to edit verified scam, suspected scam, or legitimate before publishing anything.
        hackathon_scope: must_build
        acceptance:
          - Admin can change scam status.
          - Admin can mark content out of scope or reject it.

      - id: admin.create_quiz
        title: Create Quiz From Submission
        story: As an admin, I want to turn reviewed content into a quiz question with answer choices, correct answer, explanation, and skill tags.
        hackathon_scope: must_build
        acceptance:
          - Draft question asks what the learner should do next.
          - Draft includes 3-4 answer choices.
          - Draft includes skill tags and explanation.

      - id: admin.edit_quiz
        title: Edit Quiz Draft
        story: As an admin, I want to edit the generated quiz before publishing so bad AI output never reaches learners.
        hackathon_scope: must_build
        acceptance:
          - Admin can edit prompt, choices, correct answer, explanation, risk level, red flags, and skill tags.

      - id: admin.publish_question
        title: Publish Into Question Pool
        story: As an admin, I want approved quiz questions added to a pool so quiz takers can practice.
        hackathon_scope: must_build
        acceptance:
          - Approved questions become playable immediately.
          - Published question appears in dashboard counts.

      - id: admin.reject_or_out_of_scope
        title: Reject Or Mark Out Of Scope
        story: As an admin, I want to reject content that is generic spam, advertising, broad fact-checking, or not useful for training.
        hackathon_scope: must_build
        acceptance:
          - Supports reject and out_of_scope_spam states.
          - Does not treat spam as phishing.

      - id: admin.dataset_quality
        title: Manage Dataset Quality
        story: As an admin, I want every approved item to become a structured row with teaching labels.
        hackathon_scope: must_build
        acceptance:
          - Shows content_type, source_dataset, original_label, scenario, scam_status, scope_status, threat_type, risk_level, red_flags, safest_action, skill_tags, answer_choices, correct_answer, explanation, and review_status.

      - id: admin.bulk_import
        title: Bulk Import Public Datasets
        story: As an admin, I want to import phishing and scam datasets and normalize them into reviewable quiz drafts.
        hackathon_scope: should_seed_or_mock
        acceptance:
          - Seed data can stand in for real import.
          - Unknown-provenance datasets are not pitched as verified real-world corpora.

      - id: admin.multi_reviewer
        title: Reviewer Collaboration And Roles
        story: As an admin, I want multiple reviewers, audit logs, and approval stages.
        hackathon_scope: do_not_build_now
        reason: Useful later, unnecessary for a single-admin hackathon demo.

  - id: quiz_taker
    name: Quiz Taker
    starts_when: A learner opens an approved drill from the question pool.
    primary_device: mobile_web
    stories:
      - id: quiz.take_short_quiz
        title: Take A Short Safety Quiz
        story: As a quiz taker, I want to answer realistic scam and legitimate scenarios so I can practice what to do next.
        hackathon_scope: must_build
        acceptance:
          - Plays approved questions only.
          - Works well on mobile.

      - id: quiz.choose_safest_action
        title: Choose The Safest Next Action
        story: As a quiz taker, I want questions framed around action, not trivia, so I build useful habits.
        hackathon_scope: must_build
        acceptance:
          - Primary question pattern is "What should you do next?"
          - At least one tempting wrong answer is plausible.

      - id: quiz.get_feedback
        title: Get Feedback After Answering
        story: As a quiz taker, I want to know whether I was right and why.
        hackathon_scope: must_build
        acceptance:
          - Feedback appears immediately after answering.
          - Shows correct answer, red flags, and safest action.

      - id: quiz.learn_from_wrong_answers
        title: Learn From Wrong Answers
        story: As a quiz taker, if I answer wrong, I want the app to explain why my choice was tempting and what cue I missed.
        hackathon_scope: must_build
        acceptance:
          - Wrong-answer feedback explains the missed cue.
          - Feedback is short and specific.

      - id: quiz.see_red_flags
        title: See Red Flags
        story: As a quiz taker, I want the app to highlight urgency, suspicious links, payment pressure, impersonation, and requests for credentials.
        hackathon_scope: must_build
        acceptance:
          - Shows red flags after answer reveal.
          - Maps red flags to skill tags.

      - id: quiz.skill_progress
        title: Build Skill Progress
        story: As a quiz taker, I want to see which scam-detection habits I am improving.
        hackathon_scope: must_build
        acceptance:
          - Dashboard shows accuracy and weak skill tags.

      - id: quiz.repeat_missed_skills
        title: Practice Missed Skills Again
        story: As a quiz taker, I want future quizzes to repeat weak skills until I improve.
        hackathon_scope: should_seed_or_mock
        acceptance:
          - Demo can fake adaptive ordering with seeded stats.

      - id: quiz.family_challenge_mode
        title: Family Challenge Mode
        story: As a quiz taker, I want my family to share a quiz pool and compare progress.
        hackathon_scope: should_seed_or_mock
        acceptance:
          - Dashboard can show family-level aggregate stats.

      - id: quiz.daily_habit
        title: Daily Habit Reminder
        story: As a quiz taker, I want lightweight recurring practice.
        hackathon_scope: do_not_build_now
        reason: Reminder mechanics are not needed for the live demo.

demo_path:
  - Mobile forwarder receives suspicious message and pastes it into SecondLook.
  - Browser-side redaction masks PII and defangs suspicious URLs.
  - User sees the redacted submission plus a redaction notice.
  - SecondLook returns suspected_scam, red flags, and safest next action.
  - User submits the case for review or creates a training candidate.
  - Admin sees the LLM judge prefilter and quiz draft.
  - Admin edits, approves, and publishes the quiz question.
  - Quiz taker answers the newly published question on mobile.
  - Wrong answer feedback explains why the tempting answer was risky and what cue was missed.
  - Dashboard updates approved question count, attempts, accuracy, weak skills, and dataset row growth.

build_priority:
  must_build:
    - Mobile intake and instant SecondLook check.
    - Browser-side PII redaction and URL defanging.
    - Redacted submission display and scam status result.
    - Admin review queue with LLM judge prefilter.
    - Quiz creator edit/approve/publish flow.
    - Mobile quiz flow with immediate feedback.
    - Skill and dataset dashboard.
  seed_or_mock:
    - Verified scam matching.
    - Family progress.
    - Dataset imports.
    - Adaptive repeat of missed skills.
    - Screenshot or visual examples.
  cut_for_hackathon:
    - Native mobile apps.
    - Real WhatsApp Business integration.
    - Production auth.
    - Notifications.
    - Multi-reviewer workflow.
    - Public sharing.
    - Full adaptive learning engine.
